<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo_wed.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomePaws</title>
  <script>
    (function animateTitle() {
      const title = "HomePaws";
      const emojis = ["🐾", "❤️", "✨", "🐶", "🐱"];
      let index = 0;
      let direction = 1;

      setInterval(() => {
        const currentTitle = title.substring(0, index);
        const emoji = emojis[Math.floor(Date.now() / 1000) % emojis.length];
        document.title =
          currentTitle + (index === title.length ? " " + emoji : "...");

        index += direction;
        if (index > title.length) {
          direction = -1;
          // Dừng lại một chút ở chữ đầy đủ
          setTimeout(() => {
            direction = -1;
          }, 2000);
        } else if (index < 1) {
          direction = 1;
        }
      }, 300);
    })();
  </script>
</head>

<body>
  <div id="error-boundary-overlay" style="display:none; padding: 20px; background: #fee2e2; color: #b91c1c; font-family: monospace; border: 2px solid #ef4444; margin: 20px; border-radius: 8px; z-index: 100000; position: relative;">
    <h3 style="margin: 0 0 10px 0;">Runtime Error Caught:</h3>
    <pre id="error-boundary-message" style="margin: 0; white-space: pre-wrap;"></pre>
  </div>
  <script>
    window.addEventListener('error', function(event) {
      const overlay = document.getElementById('error-boundary-overlay');
      const message = document.getElementById('error-boundary-message');
      if (overlay && message) {
        overlay.style.display = 'block';
        message.textContent = event.error ? (event.error.stack || event.error.message || event.error) : event.message;
      }
    });
    window.addEventListener('unhandledrejection', function(event) {
      const overlay = document.getElementById('error-boundary-overlay');
      const message = document.getElementById('error-boundary-message');
      if (overlay && message) {
        overlay.style.display = 'block';
        message.textContent = 'Unhandled Rejection: ' + (event.reason ? (event.reason.stack || event.reason.message || event.reason) : event);
      }
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
